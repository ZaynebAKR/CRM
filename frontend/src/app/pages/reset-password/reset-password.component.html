<div class="container">
  <div class="left-box">
    <div class="logo-triangle">
      <img src="assets/Societé.png" alt="Logo" class="logo-image">
    </div>
    <h1>Set New Password</h1>
    <p>Choose a strong password to secure your account.</p>
    <button class="btn-outline" routerLink="/login">Back to Login</button>
  </div>

  <div class="right-box">
    <h2>New Password</h2>

    <ng-container *ngIf="step === 1">
      <p class="subtitle">Enter and confirm your new password.</p>
      <input type="password" [(ngModel)]="newPassword" placeholder="New Password">
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm New Password">
      <div class="button-container">
        <button class="btn-solid" (click)="resetPassword()" [disabled]="loading">
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </div>
    </ng-container>

    <ng-container *ngIf="step === 2">
      <div class="success-box">
        <div class="success-icon">✓</div>
        <h3>Password Reset!</h3>
        <p>Your password has been changed successfully.</p>
        <button class="btn-solid" routerLink="/login">Back to Login</button>
      </div>
    </ng-container>

    <p class="login-link">Remember your password? <a routerLink="/login">Login here</a></p>
  </div>
</div>
